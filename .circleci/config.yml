version: 2.1

jobs:
  build:
    macos:
      xcode: 16.2.0
    steps:
      - checkout
      - run:
          name: Configure
          command: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
      - run:
          name: Build
          command: cmake --build build --parallel
workflows:
  build:
    jobs:
      - build
