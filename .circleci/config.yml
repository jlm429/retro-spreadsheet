version: 2.1

jobs:
  build:
    macos:
      xcode: 16.2.0
    steps:
      - checkout
      - run:
          name: Configure
          command: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
      - run:
          name: Build
          command: cmake --build build --parallel
      - run:
          name: Core tests
          command: |
            /usr/bin/perl -e 'alarm shift; exec @ARGV' 30 \
              ctest --test-dir build --output-on-failure --label-exclude ui --timeout 15
workflows:
  build:
    jobs:
      - build
