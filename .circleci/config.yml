version: 2.1

jobs:
  build-and-test:
    macos:
      xcode: 16.2.0
    steps:
      - checkout
      - run:
          name: Configure
          command: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
      - run:
          name: Build
          command: cmake --build build --parallel
      - run:
          name: Test
          command: ctest --test-dir build --output-on-failure

workflows:
  build-and-test:
    jobs:
      - build-and-test
