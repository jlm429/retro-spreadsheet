version: 2.1

jobs:
  core:
    docker:
      # This dated image provides CMake newer than the project's 3.21 minimum.
      - image: cimg/base:2024.12
    steps:
      - checkout
      - run:
          name: Configure
          command: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
      - run:
          name: Build
          command: cmake --build build --parallel
      - run:
          name: Core tests without native UI
          command: |
            timeout 30s \
              ctest --test-dir build --output-on-failure --label-exclude ui --timeout 15
workflows:
  build:
    jobs:
      - core
